; PlatformIO project for the XIAO ESP32-S3 Sense WiFi/HTTP/WS relay coproc.
;
; Current scope: receive 60 Hz telemetry + 1 Hz status + on-change params
; packets from the main ESP32 over Serial1 (UART, 460800 baud), cache the
; latest of each, and relay to web UI clients over WebSocket. HTTP
; status page is rendered from the cached snapshot. WS commands flow the
; other way (coproc → main over the same UART).
;
; Phase B (camera) is wired up now: esp32-camera library configured below,
; OV2640 init lives in src/camera.cpp, HTTP GET /stream serves multipart
; MJPEG. Phase C (PDM mic) follows the same pattern via I2S — both run
; on plain framework=arduino without revisiting the toolchain.
;
; ----------------------------------------------------------------------------
; Toolchain: plain framework=arduino on the stock espressif32 platform.
; Substantially simpler than the framework=espidf + arduino-as-component
; setup we used for Bluepad32 (now gone, BT moved to main):
;   * lib_deps auto-link (their .cpp files are compiled)
;   * Standard Arduino IDE / PIO conventions — no IDF components/, no
;     CMakeLists.txt, no sdkconfig
; The XIAO ESP32-S3 board file enables USB-CDC for Serial, 8 MB flash,
; PSRAM detection — everything we need.

[platformio]
; Pull in WiFi credentials from a git-ignored secrets file. The glob
; (rather than a literal path) means a fresh clone without the file
; still configures cleanly — the [wifi] placeholders below are used
; until the developer creates coproc/wifi_secrets.ini. See
; wifi_secrets.ini.example for the format.
extra_configs = *_secrets.ini

; WiFi credentials. These placeholders are overridden by the [wifi]
; section in wifi_secrets.ini when that file is present (see
; extra_configs above). DO NOT put real credentials here — this file
; is committed.
[wifi]
ssid = your-ssid
pass = your-password

[env:seeed_xiao_esp32s3]
platform = espressif32@6.12.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
monitor_filters = direct
upload_speed = 921600

; Match main's pinned arduino-esp32 2.0.17 release for consistency. With
; both boards on the same core version the wire protocol bindings stay
; identical and any toolchain quirks are shared.
platform_packages =
  platformio/framework-arduinoespressif32 @ 3.20017.241212+sha.dcc1105b

build_flags =
  -DCORE_DEBUG_LEVEL=3
  ; Make the shared wire_proto.h / telemetry.h / diag.h headers from
  ; the main firmware project visible to our sources. The protocol +
  ; telemetry frame layout are one source of truth on the main side;
  ; coproc just includes them.
  -I${PROJECT_DIR}/../firmware/src
  ; WiFi credentials + mDNS name. SSID/PASS come from the [wifi]
  ; section — placeholders in this file, real values in the
  ; git-ignored wifi_secrets.ini.
  -DBB_WIFI_SSID=\"${wifi.ssid}\"
  -DBB_WIFI_PASS=\"${wifi.pass}\"
  -DBB_MDNS_NAME=\"balancebot\"
  ; -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
  ; -DCONFIG_ASYNC_TCP_QUEUE_SIZE=64

lib_deps =
  ESP32Async/AsyncTCP
  ESP32Async/ESPAsyncWebServer
  bblanchon/ArduinoJson
  ; esp32-camera is bundled inside arduino-esp32 but its sources aren't
  ; auto-linked by PlatformIO unless we list it here. ^2.0.4 lines up
  ; with arduino-esp32 2.0.17. Includes the OV2640 driver and the
  ; CAMERA_FB_IN_PSRAM frame-buffer support we need for VGA JPEG.
  espressif/esp32-camera @ ^2.0.4
  ; MAX7219 8x32 dot-matrix banner on the coproc. Parola pulls
  ; MAX72XX transitively but pinning both keeps the lock explicit.
  majicdesigns/MD_MAX72XX @ ^3.5
  majicdesigns/MD_Parola  @ ^3.7
