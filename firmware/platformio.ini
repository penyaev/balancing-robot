; PlatformIO project for the balancing-bot firmware.
;
; See PLAN.md for the full design. This file pins the toolchain and the
; library set we expect to need across the implementation TODO. Libraries
; that aren't used yet are still listed so PIO resolves them eagerly and
; subsequent tasks (F5 IMU, F6 motors, F10 net, F12 joystick, ...) don't
; have to touch this file each time.

[env:esp32dev]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Pin the arduino-esp32 framework to a known-working 2.x release. The
; coproc/ project pulls in arduino-esp32 3.2.1 through the pioarduino
; platform fork, and that install replaces the shared cache entry —
; without this pin, the main firmware build picks up 3.x and breaks on
; motors.cpp's use of the legacy ledcSetup/ledcAttachPin API (renamed
; to ledcAttach in 3.x). The pin uses PlatformIO's package-version
; string for arduino-esp32 v2.0.17 (the "3.20017" prefix is PIO's
; platform-version major; the suffix is the upstream commit SHA).
platform_packages =
  platformio/framework-arduinoespressif32 @ 3.20017.241212+sha.dcc1105b

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DBB_FW_VERSION=\"0.1.0\"
  ; PS5 DualSense pairing MAC (HamzaYslmn/esp-ps5 library, Bluedroid).
  ; The controller is pre-bonded to this MAC from the original session.
  ; Empty string falls back to discovery / scan-and-pair on first boot.
  -DBB_PS5_MAC=\"a0:fa:9c:14:de:f6\"
  ; WiFi credentials and mDNS name live on the coproc now — see
  ; coproc/platformio.ini. Main has no WiFi stack in this architecture
  ; (joystick BT lives here instead; coproc owns WiFi + HTTP + WS).

; no_ota.csv is required again now that Bluedroid is back on main; the
; default 1.2 MB partition would overflow once esp-ps5 + Bluedroid land.
; Still no OTA in the deployment story so the single-app layout is fine.
board_build.partitions = no_ota.csv

; Library deps. Specific versions intentionally unpinned for now; we will
; pin once the project compiles end-to-end and we know which versions work
; together. Comments mark which TODO item first needs each library.
lib_deps =
  electroniccats/MPU6050                                  ; F5
  teemuatlut/TMCStepper                                   ; F6 (TMC2209 UART control plane)
  bblanchon/ArduinoJson                                   ; F2 / cmdrx JSON dispatch
  https://github.com/HamzaYslmn/esp-ps5.git               ; F12 — DualSense BT, rumble + lightbar APIs
